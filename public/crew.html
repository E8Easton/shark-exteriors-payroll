<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shark Exteriors — My Pay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080a0c;
      --surface: #0f1318;
      --surface2: #161c22;
      --border: #1e2530;
      --text: #e8eaed;
      --muted: #6b7785;
      --teal: #00AAEF;
      --gold: #F7941D;
      --red: #ff5252;
      --blue: #448aff;
      --purple: #b388ff;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
    .mono { font-family: 'DM Mono', monospace; }

    /* ── Layout ── */
    header {
      background: #0a1628;
      border-bottom: 3px solid #F7941D;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .logo { font-size: 18px; font-weight: 700; color: #fff; }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-info span { font-size: 14px; color: var(--muted); }
    .user-info strong { color: var(--text); }
    .btn-sm {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 6px 14px;
      font-size: 13px; cursor: pointer; font-family: inherit;
      transition: border-color .15s;
    }
    .btn-sm:hover { border-color: var(--teal); }

    main { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

    /* ── Stat cards ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .stat-card .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
    .stat-card .value { font-size: 26px; font-weight: 700; color: var(--teal); font-family: 'DM Mono', monospace; }
    .stat-card .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* ── Section ── */
    section { margin-bottom: 36px; }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    h2 { font-size: 16px; font-weight: 600; }
    .period-picker { display: flex; gap: 8px; align-items: center; }
    .period-picker input {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); padding: 6px 10px;
      font-size: 13px; outline: none; font-family: inherit;
    }
    .period-picker input:focus { border-color: var(--teal); }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th {
      text-align: left; padding: 10px 14px;
      font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .05em;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 12px 14px; border-bottom: 1px solid #111820; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }
    .paid-badge {
      display: inline-block; padding: 2px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
    }
    .paid-badge.paid { background: rgba(0,229,195,.12); color: var(--teal); }
    .paid-badge.unpaid { background: rgba(255,202,40,.1); color: var(--gold); }
    .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }

    /* ── Change password ── */
    .pw-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }
    .pw-section h2 { margin-bottom: 16px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .field input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px;
      padding: 10px 12px; outline: none; font-family: inherit;
    }
    .field input:focus { border-color: var(--teal); }
    .btn-primary {
      background: var(--teal); color: #080a0c; border: none;
      border-radius: 8px; padding: 10px 20px; font-size: 14px;
      font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .btn-primary:hover { background: #00c9aa; }
    .msg { font-size: 13px; margin-top: 10px; }
    .msg.ok { color: var(--teal); }
    .msg.err { color: var(--red); }
  </style>
</head>
<body>
  <header>
    <div class="logo"><img src="/logo.png" alt="Shark Exteriors" style="height:36px;vertical-align:middle;margin-right:10px" onerror="this.style.display='none'"><span style="color:#00AAEF;font-weight:700">Shark</span> <span style="color:#F7941D;font-weight:700">Exteriors</span></div>
    <div class="user-info">
      <span>Logged in as <strong id="userName">…</strong></span>
      <button class="btn-sm" id="logoutBtn">Sign Out</button>
    </div>
  </header>

  <main>
    <!-- All-time stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="label">All-Time Earnings</div>
        <div class="value" id="statAllTime">—</div>
        <div class="sub" id="statJobs">— jobs</div>
      </div>
      <div class="stat-card">
        <div class="label">Crew Pay</div>
        <div class="value" id="statCrewPay">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Commission</div>
        <div class="value" id="statCommission">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Outstanding</div>
        <div class="value" id="statOutstanding" style="color:var(--gold)">—</div>
        <div class="sub" id="statPaidJobs">— paid</div>
      </div>
    </div>

    <!-- Weekly breakdown -->
    <section>
      <div class="section-header">
        <h2>Weekly Breakdown</h2>
        <div class="period-picker">
          <input type="date" id="weekStart" />
          <span style="color:var(--muted)">to</span>
          <input type="date" id="weekEnd" />
          <button class="btn-sm" id="weekBtn">Load</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Date</th><th>Jobs</th>
            <th>Crew Pay</th><th>Commission</th><th>Total</th>
          </tr></thead>
          <tbody id="weekBody"><tr><td colspan="5" class="empty">Select a date range above</td></tr></tbody>
        </table>
      </div>
    </section>

    <!-- Recent jobs -->
    <section>
      <div class="section-header"><h2>Recent Jobs (last 30)</h2></div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Date</th><th>Job</th>
            <th>Crew Pay</th><th>Commission</th><th>Total</th><th>Status</th>
          </tr></thead>
          <tbody id="recentBody"><tr><td colspan="6" class="empty">Loading…</td></tr></tbody>
        </table>
      </div>
    </section>

    <!-- Change password -->
    <div class="pw-section">
      <h2>Change Password</h2>
      <div class="field">
        <label>Current Password</label>
        <input type="password" id="pwCurrent" />
      </div>
      <div class="field">
        <label>New Password</label>
        <input type="password" id="pwNew" />
      </div>
      <div class="field">
        <label>Confirm New Password</label>
        <input type="password" id="pwConfirm" />
      </div>
      <button class="btn-primary" id="pwBtn">Update Password</button>
      <div class="msg" id="pwMsg"></div>
    </div>
  </main>

  <script>
    const $ = id => document.getElementById(id);
    const fmt = n => n == null ? '—' : '$' + Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');

    // ── Auth guard ────────────────────────────────────────────────────────────
    async function init() {
      const me = await fetch('/api/auth/me').then(r => r.json()).catch(() => null);
      if (!me || !me.id) { window.location.href = '/login.html'; return; }
      if (me.role === 'owner') { window.location.href = '/index.html'; return; }
      $('userName').textContent = me.name;
      loadAllTime();
      setDefaultWeek();
    }

    $('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/login.html';
    });

    // ── All-time ──────────────────────────────────────────────────────────────
    async function loadAllTime() {
      const d = await fetch('/api/reports/my-earnings').then(r => r.json());
      const a = d.allTime || {};
      $('statAllTime').textContent = fmt(a.total_pay);
      $('statCrewPay').textContent = fmt(a.crew_pay);
      $('statCommission').textContent = fmt(a.commission_pay);
      $('statOutstanding').textContent = fmt(a.outstanding);
      $('statJobs').textContent = `${a.job_count || 0} jobs`;
      $('statPaidJobs').textContent = `${a.paid_count || 0} paid`;

      const recent = d.recent || [];
      if (!recent.length) {
        $('recentBody').innerHTML = '<tr><td colspan="6" class="empty">No jobs yet</td></tr>';
        return;
      }
      $('recentBody').innerHTML = recent.map(r => `
        <tr>
          <td>${r.date}</td>
          <td>${r.job_name}</td>
          <td class="mono">${fmt(r.crew_pay)}</td>
          <td class="mono">${fmt(r.commission_pay)}</td>
          <td class="mono" style="color:var(--teal);font-weight:600">${fmt(r.total_pay)}</td>
          <td><span class="paid-badge ${r.paid ? 'paid' : 'unpaid'}">${r.paid ? 'Paid' : 'Unpaid'}</span></td>
        </tr>
      `).join('');
    }

    // ── Weekly ────────────────────────────────────────────────────────────────
    function setDefaultWeek() {
      const today = new Date();
      const day = today.getDay(); // 0=Sun
      const mon = new Date(today); mon.setDate(today.getDate() - ((day + 6) % 7));
      const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
      $('weekStart').value = mon.toISOString().slice(0, 10);
      $('weekEnd').value = sun.toISOString().slice(0, 10);
    }

    $('weekBtn').addEventListener('click', async () => {
      const start = $('weekStart').value, end = $('weekEnd').value;
      if (!start || !end) return;
      const d = await fetch(`/api/reports/weekly?start=${start}&end=${end}`).then(r => r.json());
      const rows = d.rows || [];
      if (!rows.length) {
        $('weekBody').innerHTML = '<tr><td colspan="5" class="empty">No jobs in this period</td></tr>';
        return;
      }
      $('weekBody').innerHTML = rows.map(r => `
        <tr>
          <td>${r.date}</td>
          <td>${r.job_count}</td>
          <td class="mono">${fmt(r.crew_pay)}</td>
          <td class="mono">${fmt(r.commission_pay)}</td>
          <td class="mono" style="color:var(--teal);font-weight:600">${fmt(r.total_pay)}</td>
        </tr>
      `).join('');
    });

    // ── Change password ───────────────────────────────────────────────────────
    $('pwBtn').addEventListener('click', async () => {
      const msg = $('pwMsg');
      const cur = $('pwCurrent').value;
      const nw = $('pwNew').value;
      const cf = $('pwConfirm').value;
      if (nw !== cf) { msg.textContent = 'New passwords do not match'; msg.className = 'msg err'; return; }
      if (nw.length < 4) { msg.textContent = 'Password must be at least 4 characters'; msg.className = 'msg err'; return; }

      const res = await fetch('/api/auth/change-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ currentPassword: cur, newPassword: nw }),
      });
      if (res.ok) {
        msg.textContent = 'Password updated!';
        msg.className = 'msg ok';
        $('pwCurrent').value = $('pwNew').value = $('pwConfirm').value = '';
      } else {
        const { error } = await res.json();
        msg.textContent = error || 'Update failed';
        msg.className = 'msg err';
      }
    });

    init();
  </script>
</body>
</html>
