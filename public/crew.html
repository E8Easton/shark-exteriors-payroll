<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shark Exteriors — My Pay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --surface2: #f7fafc;
      --border: #dde3ea;
      --text: #1a2332;
      --muted: #6b7a90;
      --blue: #00AAEF;
      --blue-dark: #0090cc;
      --orange: #F7941D;
      --red: #e53935;
      --green: #00a86b;
      --navy: #0a1628;
      --shadow: 0 2px 12px rgba(0,0,0,.07);
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
    .mono { font-family: 'DM Mono', monospace; }

    header {
      background: var(--navy);
      border-bottom: 3px solid var(--orange);
      padding: 14px 28px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo .shark { font-size: 26px; }
    .logo h1 { font-size: 17px; font-weight: 800; }
    .logo h1 .blue { color: var(--blue); }
    .logo h1 .orange { color: var(--orange); }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-info span { font-size: 13px; color: rgba(255,255,255,.5); }
    .user-info strong { color: #fff; }
    .btn-sm {
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
      color: #fff; border-radius: 8px; padding: 7px 16px;
      font-size: 13px; cursor: pointer; font-family: inherit; transition: all .15s;
    }
    .btn-sm:hover { background: rgba(229,57,53,.25); border-color: rgba(229,57,53,.4); }

    main { max-width: 860px; margin: 0 auto; padding: 28px 20px; }

    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 14px; margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 20px; box-shadow: var(--shadow);
    }
    .stat-card .label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
    .stat-card .value { font-size: 24px; font-weight: 700; color: var(--blue); font-family: 'DM Mono', monospace; }
    .stat-card .value.orange { color: var(--orange); }
    .stat-card .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

    section { margin-bottom: 28px; }
    .card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 22px; box-shadow: var(--shadow); }
    .card-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }

    .period-picker { display: flex; gap: 8px; align-items: center; }
    .period-picker input {
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--text); padding: 7px 10px;
      font-size: 13px; outline: none; font-family: inherit;
    }
    .period-picker input:focus { border-color: var(--blue); }
    .btn-load {
      background: var(--blue); color: #fff; border: none;
      border-radius: 8px; padding: 7px 14px; font-size: 13px;
      font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .btn-load:hover { background: var(--blue-dark); }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th {
      text-align: left; padding: 9px 14px;
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .05em;
      border-bottom: 2px solid var(--border); background: var(--surface2);
    }
    td { padding: 11px 14px; border-bottom: 1px solid #f0f4f8; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafcff; }
    .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
    .paid-badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700;
    }
    .paid-badge.paid { background: rgba(0,168,107,.12); color: var(--green); }
    .paid-badge.unpaid { background: rgba(247,148,29,.1); color: var(--orange); }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .05em; }
    .field input {
      width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px;
      padding: 10px 12px; outline: none; font-family: inherit;
    }
    .field input:focus { border-color: var(--blue); background: #fff; }
    .btn-primary {
      background: var(--blue); color: #fff; border: none;
      border-radius: 8px; padding: 11px 22px; font-size: 14px;
      font-weight: 700; cursor: pointer; font-family: inherit; transition: background .15s;
    }
    .btn-primary:hover { background: var(--blue-dark); }
    .msg { font-size: 13px; margin-top: 10px; font-weight: 500; }
    .msg.ok { color: var(--green); }
    .msg.err { color: var(--red); }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="shark">🦈</div>
      <h1><span class="blue">Shark</span> <span class="orange">Exteriors</span></h1>
    </div>
    <div class="user-info">
      <span>Logged in as <strong id="userName">…</strong></span>
      <button class="btn-sm" id="logoutBtn">Sign Out</button>
    </div>
  </header>

  <main>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">All-Time Earnings</div>
        <div class="value" id="statAllTime">—</div>
        <div class="sub" id="statJobs">— jobs</div>
      </div>
      <div class="stat-card">
        <div class="label">Crew Pay</div>
        <div class="value" id="statCrewPay">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Commission</div>
        <div class="value" id="statCommission">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Outstanding</div>
        <div class="value orange" id="statOutstanding">—</div>
        <div class="sub" id="statPaidJobs">— paid</div>
      </div>
    </div>

    <section>
      <div class="card">
        <div class="card-title">
          Weekly Breakdown
          <div class="period-picker">
            <input type="date" id="weekStart" />
            <span style="color:var(--muted);font-size:13px">to</span>
            <input type="date" id="weekEnd" />
            <button class="btn-load" id="weekBtn">Load</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Date</th><th>Jobs</th><th>Crew Pay</th><th>Commission</th><th>Total</th></tr></thead>
            <tbody id="weekBody"><tr><td colspan="5" class="empty">Select a date range above</td></tr></tbody>
          </table>
        </div>
      </div>
    </section>

    <section>
      <div class="card">
        <div class="card-title">Recent Jobs (last 30)</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Date</th><th>Job</th><th>Crew Pay</th><th>Commission</th><th>Total</th><th>Status</th></tr></thead>
            <tbody id="recentBody"><tr><td colspan="6" class="empty">Loading…</td></tr></tbody>
          </table>
        </div>
      </div>
    </section>

    <section>
      <div class="card">
        <div class="card-title">Change Password</div>
        <div class="field"><label>Current Password</label><input type="password" id="pwCurrent" /></div>
        <div class="field"><label>New Password</label><input type="password" id="pwNew" /></div>
        <div class="field"><label>Confirm New Password</label><input type="password" id="pwConfirm" /></div>
        <button class="btn-primary" id="pwBtn">Update Password</button>
        <div class="msg" id="pwMsg"></div>
      </div>
    </section>
  </main>

  <script>
    const $ = id => document.getElementById(id);
    const fmt = n => n == null ? '—' : '$' + Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');

    async function init() {
      const me = await fetch('/api/auth/me').then(r => r.json()).catch(() => null);
      if (!me || !me.id) { window.location.href = '/login.html'; return; }
      if (me.role === 'owner') { window.location.href = '/index.html'; return; }
      $('userName').textContent = me.name;
      loadAllTime();
      setDefaultWeek();
    }

    $('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/login.html';
    });

    async function loadAllTime() {
      const d = await fetch('/api/reports/my-earnings').then(r => r.json());
      const a = d.allTime || {};
      $('statAllTime').textContent    = fmt(a.total_pay);
      $('statCrewPay').textContent    = fmt(a.crew_pay);
      $('statCommission').textContent = fmt(a.commission_pay);
      $('statOutstanding').textContent = fmt(a.outstanding);
      $('statJobs').textContent       = `${a.job_count || 0} jobs`;
      $('statPaidJobs').textContent   = `${a.paid_count || 0} paid`;

      const recent = d.recent || [];
      $('recentBody').innerHTML = recent.length ? recent.map(r => `
        <tr>
          <td>${r.date}</td>
          <td>${r.job_name}</td>
          <td class="mono">${fmt(r.crew_pay)}</td>
          <td class="mono">${fmt(r.commission_pay)}</td>
          <td class="mono" style="color:var(--blue);font-weight:700">${fmt(r.total_pay)}</td>
          <td><span class="paid-badge ${r.paid ? 'paid' : 'unpaid'}">${r.paid ? 'Paid' : 'Unpaid'}</span></td>
        </tr>`).join('')
        : '<tr><td colspan="6" class="empty">No jobs yet</td></tr>';
    }

    function setDefaultWeek() {
      const today = new Date();
      const day = today.getDay();
      const mon = new Date(today); mon.setDate(today.getDate() - ((day + 6) % 7));
      const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
      $('weekStart').value = mon.toISOString().slice(0, 10);
      $('weekEnd').value   = sun.toISOString().slice(0, 10);
    }

    $('weekBtn').addEventListener('click', async () => {
      const start = $('weekStart').value, end = $('weekEnd').value;
      if (!start || !end) return;
      const d = await fetch(`/api/reports/weekly?start=${start}&end=${end}`).then(r => r.json());
      const rows = d.rows || [];
      $('weekBody').innerHTML = rows.length ? rows.map(r => `
        <tr>
          <td>${r.date}</td>
          <td>${r.job_count}</td>
          <td class="mono">${fmt(r.crew_pay)}</td>
          <td class="mono">${fmt(r.commission_pay)}</td>
          <td class="mono" style="color:var(--blue);font-weight:700">${fmt(r.total_pay)}</td>
        </tr>`).join('')
        : '<tr><td colspan="5" class="empty">No jobs in this period</td></tr>';
    });

    $('pwBtn').addEventListener('click', async () => {
      const msg = $('pwMsg');
      const cur = $('pwCurrent').value;
      const nw  = $('pwNew').value;
      const cf  = $('pwConfirm').value;
      if (nw !== cf) { msg.textContent = 'New passwords do not match'; msg.className = 'msg err'; return; }
      if (nw.length < 4) { msg.textContent = 'Password must be at least 4 characters'; msg.className = 'msg err'; return; }
      const res = await fetch('/api/auth/change-password', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ currentPassword: cur, newPassword: nw }),
      });
      if (res.ok) {
        msg.textContent = 'Password updated!'; msg.className = 'msg ok';
        $('pwCurrent').value = $('pwNew').value = $('pwConfirm').value = '';
      } else {
        const { error } = await res.json();
        msg.textContent = error || 'Update failed'; msg.className = 'msg err';
      }
    });

    init();
  </script>
</body>
</html>
