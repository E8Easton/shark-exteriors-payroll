<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shark Exteriors — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/theme.css" />
  <link rel="stylesheet" href="/css/perf.css" />
  <link rel="stylesheet" href="/css/brand.css" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <meta name="theme-color" content="#080c12" />
  <style>
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .login-card {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 24px; padding: 48px 42px; width: 100%; max-width: 420px;
      box-shadow: var(--shadow);
    }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { font-size: 28px; font-weight: 800; letter-spacing: -.02em; }
    .logo p { color: var(--muted); font-size: 13px; margin-top: 6px; }
    .stripe {
      height: 3px; background: linear-gradient(90deg, var(--blue), var(--orange));
      border-radius: 2px; margin-bottom: 28px;
    }
    .error {
      background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.25);
      color: var(--red); border-radius: var(--radius-sm);
      padding: 12px 14px; font-size: 13px; margin-bottom: 18px; display: none;
    }
    .btn { width: 100%; margin-top: 6px; justify-content: center; padding: 14px; font-size: 15px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
    <div class="brand-icon brand-icon-xl" aria-hidden="true">
      <img src="/icon.svg" alt="" width="64" height="64" />
    </div>
      <h1><span class="b">Shark</span> <span class="o">Exteriors</span></h1>
      <p>Payroll Management</p>
    </div>
    <div class="stripe"></div>
    <div class="error" id="err"></div>
    <form id="loginForm">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" type="text" autocomplete="username" placeholder="e.g. easton" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
      </div>
      <button class="btn" type="submit">Sign In</button>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const err = document.getElementById('err');
      err.style.display = 'none';
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value,
        }),
      });
      if (res.ok) {
        const { role } = await res.json();
        window.location.href = role === 'owner' ? '/index.html' : '/crew.html';
      } else {
        const { error } = await res.json();
        err.textContent = error || 'Login failed';
        err.style.display = 'block';
      }
    });
  </script>
</body>
</html>
