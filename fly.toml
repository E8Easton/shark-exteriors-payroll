# Fly.io — persistent SQLite at /data (survives restarts & redeploys for the full season)
app = 'shark-exteriors-payroll'
primary_region = 'iad'

[build]

[env]
  NODE_ENV = 'production'
  DB_PATH = '/data/payroll.db'
  SESSIONS_PATH = '/data/sessions'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = '15s'
    interval = '30s'
    method = 'GET'
    path = '/health'
    timeout = '5s'

[[mounts]]
  source = 'payroll_data'
  destination = '/data'
  initial_size = '1gb'
