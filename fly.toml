# Fly.io — link this GitHub repo in the Fly dashboard, then Deploy.
# App name must match your Fly app (rename here if yours is different).
app = 'shark-exteriors-payroll'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[processes]
  app = 'node server.js'

[env]
  NODE_ENV = 'production'
  DATA_DIR = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = '20s'
    interval = '30s'
    method = 'GET'
    path = '/health'
    timeout = '5s'

# Required for season-long data. Create this volume in Fly dashboard BEFORE deploy:
# Storage → Volumes → Create → name: payroll_data, region: iad, size: 1GB
[[mounts]]
  source = 'payroll_data'
  destination = '/data'
